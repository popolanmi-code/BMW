<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Heart Animation</title>
    <style>
        * { margin: 0; padding: 0; }
        body { background: #000; overflow: hidden; }
        canvas { display: block; }
    </style>
</head>
<body>
<canvas id="canvas"></canvas>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const cx = canvas.width / 2;
const cy = canvas.height / 2;

let time = 0;
const TOTAL_TIME = 300; // وقت التشكل

function heartX(t) { return 16 * Math.pow(Math.sin(t), 3); }
function heartY(t) { return -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t)); }

// نقاط القلب
const heartPoints = [];
for (let t = 0; t < Math.PI * 2; t += 0.03) {
    heartPoints.push({
        x: heartX(t),
        y: heartY(t),
        t: t
    });
}

class Ray {
    constructor(index, total) {
        this.index = index;
        this.total = total;
        // زاوية البداية عشوائية
        this.startAngle = (index / total) * Math.PI * 2;
        // النقطة المستهدفة على القلب
        const pt = heartPoints[index % heartPoints.length];
        this.targetX = pt.x;
        this.targetY = pt.y;
        this.scale = 14;
        // تأخير الظهور
        this.delay = (index / total) * 150;
        // طول الشعاع الحالي
        this.currentLength = 0;
        this.maxLength = Math.sqrt(
            Math.pow(pt.x * this.scale, 2) +
            Math.pow(pt.y * this.scale, 2)
        );
        // لون
        const g = Math.floor(Math.random() * 60);
        this.color = `255,${g},0`;
        this.width = Math.random() * 1.5 + 0.5;
        this.glow = Math.random() * 20 + 10;
        // ذبذبة
        this.wobble = Math.random() * 0.3;
        this.wobbleSpeed = Math.random() * 0.05 + 0.02;
        this.wobbleTime = Math.random() * Math.PI * 2;
    }

    update() {
        if (time < this.delay) return;
        const progress = Math.min((time - this.delay) / (TOTAL_TIME * 0.7), 1);
        // تمتد الأشعة بشكل ناعم
        this.currentLength = this.maxLength * this.easeOut(progress);
        this.wobbleTime += this.wobbleSpeed;
    }

    easeOut(t) {
        return 1 - Math.pow(1 - t, 3);
    }

    draw() {
        if (time < this.delay || this.currentLength <= 0) return;

        const phase = Math.min(time / TOTAL_TIME, 1);
        const glowPhase = Math.min(Math.max((time - TOTAL_TIME * 0.5) / (TOTAL_TIME * 0.5), 0), 1);

        const ratio = this.currentLength / this.maxLength;

        // اتجاه الشعاع مع ذبذبة خفيفة
        const wobbleX = Math.sin(this.wobbleTime) * this.wobble * (1 - ratio);
        const wobbleY = Math.cos(this.wobbleTime) * this.wobble * (1 - ratio);

        const endX = cx + (this.targetX * this.scale + wobbleX) * ratio;
        const endY = cy + (this.targetY * this.scale + wobbleY) * ratio;

        // شعاع رئيسي
        ctx.save();
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.lineTo(endX, endY);

        const alpha = 0.6 + glowPhase * 0.4;
        const glowSize = this.glow * (1 + glowPhase * 2);

        ctx.shadowBlur = glowSize;
        ctx.shadowColor = `rgba(255,0,0,1)`;
        ctx.strokeStyle = `rgba(${this.color},${alpha})`;
        ctx.lineWidth = this.width * (1 + glowPhase * 1.5);
        ctx.lineCap = 'round';
        ctx.stroke();

        // شعاع داخلي أبيض/أصفر لامع
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.lineTo(endX, endY);
        ctx.shadowBlur = 5;
        ctx.shadowColor = 'white';
        ctx.strokeStyle = `rgba(255,220,150,${0.3 + glowPhase * 0.4})`;
        ctx.lineWidth = this.width * 0.3;
        ctx.stroke();

        // نقطة نهاية الشعاع
        if (ratio > 0.95) {
            ctx.beginPath();
            ctx.arc(endX, endY, 2 + glowPhase * 3, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255,200,100,${glowPhase})`;
            ctx.shadowBlur = 15;
            ctx.shadowColor = 'red';
            ctx.fill();
        }

        ctx.restore();
    }
}

// أشعة إضافية للتوهج
class GlowRay {
    constructor() {
        this.reset();
    }
    reset() {
        const idx = Math.floor(Math.random() * heartPoints.length);
        const pt = heartPoints[idx];
        this.scale = 14;
        this.tx = pt.x * this.scale;
        this.ty = pt.y * this.scale;
        this.life = 1;
        this.decay = Math.random() * 0.02 + 0.005;
        this.width = Math.random() * 3 + 1;
        this.glow = Math.random() * 30 + 15;
    }
    update() {
        this.life -= this.decay;
        if (this.life <= 0) this.reset();
    }
    draw() {
        const glowPhase = Math.min(Math.max((time - TOTAL_TIME * 0.6) / (TOTAL_TIME * 0.4), 0), 1);
        if (glowPhase <= 0) return;

        ctx.save();
        ctx.globalAlpha = this.life * glowPhase;
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.lineTo(cx + this.tx, cy + this.ty);
        ctx.shadowBlur = this.glow;
        ctx.shadowColor = 'red';
        ctx.strokeStyle = `rgba(255,50,0,0.8)`;
        ctx.lineWidth = this.width;
        ctx.lineCap = 'round';
        ctx.stroke();
        ctx.restore();
    }
}

// توهج القلب المكتمل
function drawHeartGlow() {
    const glowPhase = Math.min(Math.max((time - TOTAL_TIME * 0.8) / 100, 0), 1);
    if (glowPhase <= 0) return;

    const pulse = 1 + Math.sin(time * 0.05) * 0.05;
    const scale = 14 * pulse;

    // طبقات توهج متعددة
    for (let layer = 3; layer >= 0; layer--) {
        ctx.save();
        ctx.beginPath();
        for (let t = 0; t <= Math.PI * 2; t += 0.02) {
            const x = cx + heartX(t) * scale;
            const y = cy + heartY(t) * scale;
            if (t === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
        }
        ctx.closePath();

        const layerGlow = (layer + 1) * 20 * glowPhase;
        ctx.shadowBlur = layerGlow;
        ctx.shadowColor = 'red';
        ctx.strokeStyle = `rgba(255,${layer*20},0,${glowPhase * (0.3 + layer * 0.1)})`;
        ctx.lineWidth = 1 + layer * 0.5;
        ctx.stroke();
        ctx.restore();
    }

    // توهج داخلي
    ctx.save();
    const innerGrad = ctx.createRadialGradient(cx, cy - 20, 0, cx, cy, 180 * pulse);
    innerGrad.addColorStop(0, `rgba(255,80,0,${glowPhase * 0.4})`);
    innerGrad.addColorStop(0.4, `rgba(255,0,0,${glowPhase * 0.2})`);
    innerGrad.addColorStop(1, 'rgba(0,0,0,0)');

    ctx.beginPath();
    for (let t = 0; t <= Math.PI * 2; t += 0.02) {
        const x = cx + heartX(t) * scale;
        const y = cy + heartY(t) * scale;
        if (t === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.fillStyle = innerGrad;
    ctx.fill();
    ctx.restore();
}

// توهج مركزي
function drawCenterGlow() {
    const phase = Math.min(time / 50, 1);
    const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, 80 * phase);
    grad.addColorStop(0, `rgba(255,150,50,${phase * 0.8})`);
    grad.addColorStop(0.3, `rgba(255,50,0,${phase * 0.4})`);
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(cx, cy, 80 * phase, 0, Math.PI * 2);
    ctx.fill();
}

// إنشاء الأشعة
const NUM_RAYS = 200;
const rays = Array.from({length: NUM_RAYS}, (_, i) => new Ray(i, NUM_RAYS));
const glowRays = Array.from({length: 50}, () => new GlowRay());

function animate() {
    time++;

    ctx.fillStyle = 'rgba(0,0,0,0.15)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    drawCenterGlow();
    drawHeartGlow();

    glowRays.forEach(r => { r.update(); r.draw(); });
    rays.forEach(r => { r.update(); r.draw(); });

    requestAnimationFrame(animate);
}

animate();

window.addEventListener('resize', () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});
</script>
</body>
</html>
