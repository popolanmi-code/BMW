<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Welcome</title>
    <style>
        * { margin: 0; padding: 0; }
        body { overflow: hidden; background: #000010; }
        canvas { position: fixed; top: 0; left: 0; z-index: 0; }
        .content {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        h1 {
            color: white;
            font-size: 3em;
            font-family: Arial;
            text-shadow: 0 0 20px purple;
            margin-bottom: 40px;
        }
        button {
            padding: 15px 50px;
            font-size: 1.2em;
            background: rgba(150, 0, 255, 0.4);
            color: white;
            border: 2px solid purple;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover {
            background: rgba(150, 0, 255, 0.8);
            transform: scale(1.1);
        }
    </style>
</head>
<body>
<canvas id="bg"></canvas>
<div class="content">
    <h1>✨ Welcome ✨</h1>
    <button onclick="window.location='heart.html'">Enter ❤️</button>
</div>

<script>
const canvas = document.getElementById('bg');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// خلفية
ctx.fillStyle = '#000010';
ctx.fillRect(0, 0, canvas.width, canvas.height);

// نجوم
for (let i = 0; i < 300; i++) {
    ctx.beginPath();
    ctx.arc(Math.random()*canvas.width, Math.random()*canvas.height, Math.random()*1.5, 0, Math.PI*2);
    ctx.fillStyle = `rgba(255,255,255,${Math.random()})`;
    ctx.fill();
}

// بنفسجي
const g1 = ctx.createRadialGradient(canvas.width*0.3, canvas.height*0.4, 0, canvas.width*0.3, canvas.height*0.4, 400);
g1.addColorStop(0, 'rgba(150,0,255,0.3)');
g1.addColorStop(1, 'rgba(0,0,0,0)');
ctx.fillStyle = g1;
ctx.fillRect(0, 0, canvas.width, canvas.height);

// أزرق
const g2 = ctx.createRadialGradient(canvas.width*0.7, canvas.height*0.6, 0, canvas.width*0.7, canvas.height*0.6, 350);
g2.addColorStop(0, 'rgba(0,100,255,0.25)');
g2.addColorStop(1, 'rgba(0,0,0,0)');
ctx.fillStyle = g2;
ctx.fillRect(0, 0, canvas.width, canvas.height);
</script>
</body>
</html>
