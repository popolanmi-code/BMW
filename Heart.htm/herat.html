<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Heart Animation</title>
    <style>
        * { margin: 0; padding: 0; }
        body { background: #000; overflow: hidden; }
        canvas { display: block; }
    </style>
</head>
<body>
<canvas id="canvas"></canvas>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const particles = [];
const NUM = 500;
let time = 0;

function heartX(t) { return 16 * Math.pow(Math.sin(t), 3); }
function heartY(t) { return -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t)); }

class Particle {
    constructor() { this.reset(); }
    reset() {
        const t = Math.random() * Math.PI * 2;
        const scale = 14 + Math.sin(time * 0.05) * 2;
        const noise = (Math.random() - 0.5) * 20;
        this.x = canvas.width/2 + heartX(t) * scale + noise;
        this.y = canvas.height/2 + heartY(t) * scale + noise;
        this.vx = (Math.random() - 0.5) * 1.5;
        this.vy = (Math.random() - 0.5) * 1.5 - 0.5;
        this.size = Math.random() * 4 + 1;
        this.life = 1;
        this.decay = Math.random() * 0.015 + 0.005;
        // ألوان نار حمراء
        const r = 255;
        const g = Math.floor(Math.random() * 80);
        const b = 0;
        this.color = `${r},${g},${b}`;
    }
    update() {
        this.x += this.vx;
        this.y += this.vy;
        this.life -= this.decay;
        this.size *= 0.995;
        if (this.life <= 0) this.reset();
    }
    draw() {
        ctx.save();
        ctx.globalAlpha = this.life * 0.8;
        // توهج النار
        const grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size * 3);
        grad.addColorStop(0, `rgba(${this.color},1)`);
        grad.addColorStop(0.5, `rgba(${this.color},0.5)`);
        grad.addColorStop(1, `rgba(${this.color},0)`);
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size * 3, 0, Math.PI*2);
        ctx.fill();

        // النقطة المركزية
        ctx.fillStyle = `rgba(255,200,100,${this.life})`;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size * 0.5, 0, Math.PI*2);
        ctx.fill();
        ctx.restore();
    }
}

// إضافة جسيمات توهج إضافية
class GlowParticle {
    constructor() { this.reset(); }
    reset() {
        const t = Math.random() * Math.PI * 2;
        const scale = 14;
        this.x = canvas.width/2 + heartX(t) * scale;
        this.y = canvas.height/2 + heartY(t) * scale;
        this.size = Math.random() * 20 + 5;
        this.life = Math.random();
        this.decay = Math.random() * 0.008 + 0.003;
    }
    update() {
        this.life -= this.decay;
        this.size *= 0.99;
        if (this.life <= 0) this.reset();
    }
    draw() {
        ctx.save();
        ctx.globalAlpha = this.life * 0.3;
        const grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size);
        grad.addColorStop(0, 'rgba(255,50,0,1)');
        grad.addColorStop(1, 'rgba(255,0,0,0)');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
        ctx.fill();
        ctx.restore();
    }
}

for (let i = 0; i < NUM; i++) particles.push(new Particle());
const glows = [];
for (let i = 0; i < 100; i++) glows.push(new GlowParticle());

function animate() {
    time++;
    ctx.fillStyle = 'rgba(0,0,0,0.15)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // رسم التوهج الكبير
    glows.forEach(g => { g.update(); g.draw(); });

    // رسم الجسيمات
    particles.forEach(p => { p.update(); p.draw(); });

    requestAnimationFrame(animate);
}

animate();

window.addEventListener('resize', () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});
</script>
</body>
</html>
