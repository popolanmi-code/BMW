<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dragon</title>
    <style>
        * { margin: 0; padding: 0; }
        body { overflow: hidden; background: #ebe7de; cursor: crosshair; }
        canvas { display: block; }
    </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let mouseX = canvas.width/2;
let mouseY = canvas.height/2;
window.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });

const SEGMENTS = 60;
const GAP = 18;
const body = [];
for (let i = 0; i < SEGMENTS; i++) {
    body.push({ x: canvas.width/2 - i*GAP, y: canvas.height/2 });
}

let targetX = canvas.width/2;
let targetY = canvas.height/2;

function drawWing(cx, cy, angle, side) {
    const w = side * 1;
    
    // جناح كبير
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    
    const c1x = cx + Math.cos(angle + w*1.2) * 80;
    const c1y = cy + Math.sin(angle + w*1.2) * 80;
    const c2x = cx + Math.cos(angle + w*1.6) * 180;
    const c2y = cy + Math.sin(angle + w*1.6) * 180;
    const tipx = cx + Math.cos(angle + w*1.0) * 220;
    const tipy = cy + Math.sin(angle + w*1.0) * 220;
    const endx = cx + Math.cos(angle + w*0.3) * 120;
    const endy = cy + Math.sin(angle + w*0.3) * 120;

    ctx.bezierCurveTo(c1x, c1y, c2x, c2y, tipx, tipy);
    ctx.bezierCurveTo(
        tipx + Math.cos(angle - w*0.5)*60,
        tipy + Math.sin(angle - w*0.5)*60,
        endx + Math.cos(angle + w*0.8)*40,
        endy + Math.sin(angle + w*0.8)*40,
        cx, cy
    );
    
    ctx.fillStyle = 'rgba(60,50,40,0.15)';
    ctx.fill();
    ctx.strokeStyle = 'rgba(40,35,30,0.7)';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // عروق الجناح
    const numVeins = 8;
    for (let v = 0; v < numVeins; v++) {
        const vAngle = angle + w*(0.4 + v*0.15);
        const vLen = 80 + v * 18;
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.lineTo(cx + Math.cos(vAngle)*vLen, cy + Math.sin(vAngle)*vLen);
        ctx.strokeStyle = `rgba(40,35,30,${0.5 - v*0.04})`;
        ctx.lineWidth = 1;
        ctx.stroke();
    }
}

function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#ebe7de';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // هدف يتبع الماوس ببطء
    targetX += (mouseX - targetX) * 0.04;
    targetY += (mouseY - targetY) * 0.04;

    body[0].x += (targetX - body[0].x) * 0.15;
    body[0].y += (targetY - body[0].y) * 0.15;

    for (let i = 1; i < SEGMENTS; i++) {
        const dx = body[i-1].x - body[i].x;
        const dy = body[i-1].y - body[i].y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist > GAP) {
            body[i].x = body[i-1].x - (dx/dist)*GAP;
            body[i].y = body[i-1].y - (dy/dist)*GAP;
        }
    }

    // جناحين قرب الرأس
    const w1 = 5;
    const w2 = 10;
    const angle1 = Math.atan2(body[w1-1].y - body[w1].y, body[w1-1].x - body[w1].x);
    const angle2 = Math.atan2(body[w2-1].y - body[w2].y, body[w2-1].x - body[w2].x);
    
    drawWing(body[w1].x, body[w1].y, angle1, -1);
    drawWing(body[w1].x, body[w1].y, angle1, 1);
    drawWing(body[w2].x, body[w2].y, angle2, -1);
    drawWing(body[w2].x, body[w2].y, angle2, 1);

    // رسم الجسم من الذيل للرأس
    for (let i = SEGMENTS-1; i >= 1; i--) {
        const angle = Math.atan2(body[i-1].y - body[i].y, body[i-1].x - body[i].x);
        const t = i / SEGMENTS;
        const size = 10 * (1 - t * 0.75);
        const alpha = 0.9 - t * 0.3;

        // عظام جانبية كبيرة
        const boneLen = (size * 5) * (1 - t * 0.4);
        
        // عظمة يمين
        ctx.beginPath();
        ctx.moveTo(body[i].x, body[i].y);
        ctx.lineTo(
            body[i].x + Math.cos(angle + Math.PI/2) * boneLen,
            body[i].y + Math.sin(angle + Math.PI/2) * boneLen
        );
        ctx.strokeStyle = `rgba(40,35,30,${alpha * 0.8})`;
        ctx.lineWidth = 2;
        ctx.stroke();

        // عظمة يسار
        ctx.beginPath();
        ctx.moveTo(body[i].x, body[i].y);
        ctx.lineTo(
            body[i].x + Math.cos(angle - Math.PI/2) * boneLen,
            body[i].y + Math.sin(angle - Math.PI/2) * boneLen
        );
        ctx.strokeStyle = `rgba(40,35,30,${alpha * 0.8})`;
        ctx.lineWidth = 2;
        ctx.stroke();

        // خط الجسم
        ctx.beginPath();
        ctx.moveTo(body[i].x, body[i].y);
        ctx.lineTo(body[i-1].x, body[i-1].y);
        ctx.strokeStyle = `rgba(30,25,20,${alpha})`;
        ctx.lineWidth = size;
        ctx.lineCap = 'round';
        ctx.stroke();

        // مفصل
        ctx.beginPath();
        ctx.arc(body[i].x, body[i].y, size * 0.6, 0, Math.PI*2);
        ctx.fillStyle = `rgba(30,25,20,${alpha})`;
        ctx.fill();
    }

    // الرأس
    const headAngle = Math.atan2(body[0].y - body[1].y, body[0].x - body[1].x);
    ctx.beginPath();
    ctx.ellipse(body[0].x, body[0].y, 16, 11, headAngle, 0, Math.PI*2);
    ctx.fillStyle = '#111';
    ctx.fill();

    // فم/منقار
    ctx.beginPath();
    ctx.moveTo(body[0].x + Math.cos(headAngle)*12, body[0].y + Math.sin(headAngle)*12);
    ctx.lineTo(body[0].x + Math.cos(headAngle)*30, body[0].y + Math.sin(headAngle)*30);
    ctx.strokeStyle = '#111';
    ctx.lineWidth = 5;
    ctx.lineCap = 'round';
    ctx.stroke();

    // عين
    const ex = body[0].x + Math.cos(headAngle - 0.6)*9;
    const ey = body[0].y + Math.sin(headAngle - 0.6)*9;
    ctx.beginPath();
    ctx.arc(ex, ey, 5, 0, Math.PI*2);
    ctx.fillStyle = 'white';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(ex, ey, 2.5, 0, Math.PI*2);
    ctx.fillStyle = '#000';
    ctx.fill();

    // نص
    ctx.fillStyle = 'rgba(60,40,30,0.8)';
    ctx.font = 'italic 15px Georgia';
    ctx.fillText('Click to Enter ❤️', body[0].x + 35, body[0].y - 15);

    requestAnimationFrame(animate);
}

canvas.addEventListener('click', () => { window.location = 'heart.html'; });
animate();
</script>
</body>
</html>
