<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dragon</title>
    <style>
        * { margin: 0; padding: 0; }
        body { overflow: hidden; background: #e8e4dc; cursor: crosshair; }
        canvas { display: block; }
    </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let mouseX = canvas.width / 2;
let mouseY = canvas.height / 2;

window.addEventListener('mousemove', e => {
    mouseX = e.clientX;
    mouseY = e.clientY;
});

const SEGMENTS = 60;
const body = [];
for (let i = 0; i < SEGMENTS; i++) {
    body.push({ x: canvas.width/2 - i*10, y: canvas.height/2 });
}

// هدف التنين يكون خلف الماوس بمسافة
let targetX = canvas.width / 2;
let targetY = canvas.height / 2;

function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // خلفية بيج مثل الصورة
    ctx.fillStyle = '#e8e4dc';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // الهدف يتبع الماوس ببطء (مسافة)
    targetX += (mouseX - targetX) * 0.05;
    targetY += (mouseY - targetY) * 0.05;

    // تحريك الرأس نحو الهدف
    body[0].x += (targetX - body[0].x) * 0.15;
    body[0].y += (targetY - body[0].y) * 0.15;

    // تحريك الجسم
    for (let i = 1; i < SEGMENTS; i++) {
        const dx = body[i-1].x - body[i].x;
        const dy = body[i-1].y - body[i].y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        const gap = 14;
        if (dist > gap) {
            body[i].x = body[i-1].x - (dx/dist)*gap;
            body[i].y = body[i-1].y - (dy/dist)*gap;
        }
    }

    // رسم التنين
    for (let i = SEGMENTS-1; i >= 1; i--) {
        const angle = Math.atan2(
            body[i-1].y - body[i].y,
            body[i-1].x - body[i].x
        );
        const t = i / SEGMENTS;
        const size = 3 + (1-t) * 8;

        // ريش على الجانبين
        if (i % 2 === 0) {
            const finLen = size * 4 * (1 - t*0.5);
            const finAngle1 = angle + Math.PI/2;
            const finAngle2 = angle - Math.PI/2;

            // ريش يمين
            ctx.beginPath();
            ctx.moveTo(body[i].x, body[i].y);
            ctx.quadraticCurveTo(
                body[i].x + Math.cos(finAngle1) * finLen * 0.5,
                body[i].y + Math.sin(finAngle1) * finLen * 0.5,
                body[i].x + Math.cos(finAngle1 + 0.3) * finLen,
                body[i].y + Math.sin(finAngle1 + 0.3) * finLen
            );
            ctx.strokeStyle = `rgba(60,50,40,${0.6 - t*0.4})`;
            ctx.lineWidth = 1;
            ctx.stroke();

            // ريش يسار
            ctx.beginPath();
            ctx.moveTo(body[i].x, body[i].y);
            ctx.quadraticCurveTo(
                body[i].x + Math.cos(finAngle2) * finLen * 0.5,
                body[i].y + Math.sin(finAngle2) * finLen * 0.5,
                body[i].x + Math.cos(finAngle2 - 0.3) * finLen,
                body[i].y + Math.sin(finAngle2 - 0.3) * finLen
            );
            ctx.strokeStyle = `rgba(60,50,40,${0.6 - t*0.4})`;
            ctx.lineWidth = 1;
            ctx.stroke();
        }

        // العمود الفقري
        ctx.beginPath();
        ctx.arc(body[i].x, body[i].y, size * 0.4, 0, Math.PI*2);
        ctx.fillStyle = `rgba(40,35,30,${0.9 - t*0.5})`;
        ctx.fill();

        // خط الجسم
        if (i < SEGMENTS-1) {
            ctx.beginPath();
            ctx.moveTo(body[i].x, body[i].y);
            ctx.lineTo(body[i+1].x, body[i+1].y);
            ctx.strokeStyle = `rgba(40,35,30,${0.5 - t*0.3})`;
            ctx.lineWidth = size * 0.6;
            ctx.stroke();
        }
    }

    // الرأس
    ctx.beginPath();
    ctx.arc(body[0].x, body[0].y, 12, 0, Math.PI*2);
    ctx.fillStyle = '#1a1510';
    ctx.fill();

    // منقار/فم
    const headAngle = Math.atan2(body[0].y - body[1].y, body[0].x - body[1].x);
    ctx.beginPath();
    ctx.moveTo(body[0].x, body[0].y);
    ctx.lineTo(
        body[0].x + Math.cos(headAngle) * 18,
        body[0].y + Math.sin(headAngle) * 18
    );
    ctx.strokeStyle = '#1a1510';
    ctx.lineWidth = 4;
    ctx.stroke();

    // عين
    ctx.beginPath();
    ctx.arc(
        body[0].x + Math.cos(headAngle - 0.4) * 6,
        body[0].y + Math.sin(headAngle - 0.4) * 6,
        3, 0, Math.PI*2
    );
    ctx.fillStyle = 'white';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(
        body[0].x + Math.cos(headAngle - 0.4) * 6,
        body[0].y + Math.sin(headAngle - 0.4) * 6,
        1.5, 0, Math.PI*2
    );
    ctx.fillStyle = 'black';
    ctx.fill();

    requestAnimationFrame(animate);
}

canvas.addEventListener('click', () => {
    window.location = 'heart.html';
});

animate();
</script>
</body>
</html>
