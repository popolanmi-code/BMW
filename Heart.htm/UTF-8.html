<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dragon</title>
    <style>
        * { margin: 0; padding: 0; }
        body { overflow: hidden; background: #000; cursor: none; }
        canvas { display: block; }
    </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let mouseX = canvas.width / 2;
let mouseY = canvas.height / 2;

window.addEventListener('mousemove', e => {
    mouseX = e.clientX;
    mouseY = e.clientY;
});

const SEGMENTS = 40;
const body = [];
for (let i = 0; i < SEGMENTS; i++) {
    body.push({ x: canvas.width/2, y: canvas.height/2 });
}

function animate() {
    // خلفية
    ctx.fillStyle = 'rgba(0,0,10,0.3)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // تحريك الرأس
    body[0].x += (mouseX - body[0].x) * 0.2;
    body[0].y += (mouseY - body[0].y) * 0.2;

    // تحريك الجسم
    for (let i = 1; i < SEGMENTS; i++) {
        body[i].x += (body[i-1].x - body[i].x) * 0.5;
        body[i].y += (body[i-1].y - body[i].y) * 0.5;
    }

    // رسم الجسم
    for (let i = SEGMENTS-1; i >= 0; i--) {
        const size = 18 - (i / SEGMENTS) * 14;
        
        // ريش
        if (i > 2 && i % 2 === 0) {
            const angle = Math.atan2(
                body[i].y - body[i-1].y,
                body[i].x - body[i-1].x
            );
            const finSize = size * 3;
            
            ctx.beginPath();
            ctx.moveTo(body[i].x, body[i].y);
            ctx.lineTo(
                body[i].x + Math.cos(angle + Math.PI/2) * finSize,
                body[i].y + Math.sin(angle + Math.PI/2) * finSize
            );
            ctx.strokeStyle = `rgba(255, 150, 0, 0.8)`;
            ctx.lineWidth = 2;
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(body[i].x, body[i].y);
            ctx.lineTo(
                body[i].x + Math.cos(angle - Math.PI/2) * finSize,
                body[i].y + Math.sin(angle - Math.PI/2) * finSize
            );
            ctx.stroke();
        }

        // جسم
        ctx.beginPath();
        ctx.arc(body[i].x, body[i].y, Math.max(size, 2), 0, Math.PI*2);
        ctx.fillStyle = `rgb(255, ${100 + i*3}, 0)`;
        ctx.shadowBlur = 15;
        ctx.shadowColor = 'orange';
        ctx.fill();
    }

    // رأس
    ctx.beginPath();
    ctx.arc(body[0].x, body[0].y, 18, 0, Math.PI*2);
    ctx.fillStyle = 'yellow';
    ctx.shadowBlur = 30;
    ctx.shadowColor = 'orange';
    ctx.fill();

    // عيون
    ctx.shadowBlur = 0;
    ctx.beginPath();
    ctx.arc(body[0].x - 6, body[0].y - 5, 4, 0, Math.PI*2);
    ctx.fillStyle = 'red';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(body[0].x + 6, body[0].y - 5, 4, 0, Math.PI*2);
    ctx.fillStyle = 'red';
    ctx.fill();

    // نص
    ctx.fillStyle = 'white';
    ctx.font = 'bold 16px Arial';
    ctx.fillText('Click to Enter ❤️', body[0].x + 25, body[0].y);

    requestAnimationFrame(animate);
}

canvas.addEventListener('click', () => {
    window.location = 'heart.html';
});

animate();
</script>
</body>
</html>
