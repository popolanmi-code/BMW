<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Platform Game</title>
    <style>
        * { margin: 0; padding: 0; }
        body { background: #1a1a2e; display: flex; justify-content: center; align-items: center; height: 100vh; }
        canvas { border: 2px solid #444; border-radius: 8px; }
        #ui {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-family: Arial;
            font-size: 16px;
            text-align: center;
        }
    </style>
</head>
<body>
<div id="ui">⬅️➡️ للحركة | ⬆️ أو Space للقفز</div>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
canvas.width = 800;
canvas.height = 500;

// الحالة
const keys = {};
window.addEventListener('keydown', e => keys[e.key] = true);
window.addEventListener('keyup', e => keys[e.key] = false);

// اللاعب
const player = {
    x: 100, y: 300,
    w: 40, h: 50,
    vx: 0, vy: 0,
    speed: 5,
    jumpPower: -14,
    onGround: false,
    color: '#e74c3c',
    score: 0,
    lives: 3
};

// المنصات
const platforms = [
    { x: 0,   y: 450, w: 800, h: 50 },  // أرضية
    { x: 100, y: 350, w: 120, h: 15 },
    { x: 300, y: 280, w: 120, h: 15 },
    { x: 500, y: 320, w: 120, h: 15 },
    { x: 200, y: 200, w: 100, h: 15 },
    { x: 600, y: 200, w: 150, h: 15 },
    { x: 400, y: 150, w: 100, h: 15 },
];

// العملات
const coins = [
    { x: 150, y: 320, collected: false },
    { x: 340, y: 250, collected: false },
    { x: 540, y: 290, collected: false },
    { x: 230, y: 170, collected: false },
    { x: 640, y: 170, collected: false },
    { x: 430, y: 120, collected: false },
    { x: 700, y: 170, collected: false },
];

// الأعداء
const enemies = [
    { x: 320, y: 255, w: 35, h: 35, vx: 1.5, startX: 300, endX: 420 },
    { x: 520, y: 295, w: 35, h: 35, vx: -1.5, startX: 500, endX: 620 },
    { x: 100, y: 415, w: 35, h: 35, vx: 1, startX: 0, endX: 350 },
];

let gameOver = false;
let win = false;
let animFrame = 0;

function checkCollision(a, b) {
    return a.x < b.x + b.w && a.x + a.w > b.x &&
           a.y < b.y + b.h && a.y + a.h > b.y;
}

function update() {
    if (gameOver || win) return;
    animFrame++;

    // حركة اللاعب
    if (keys['ArrowLeft'] || keys['a']) player.vx = -player.speed;
    else if (keys['ArrowRight'] || keys['d']) player.vx = player.speed;
    else player.vx *= 0.8;

    if ((keys['ArrowUp'] || keys[' '] || keys['w']) && player.onGround) {
        player.vy = player.jumpPower;
        player.onGround = false;
    }

    player.vy += 0.6; // جاذبية
    player.x += player.vx;
    player.y += player.vy;
    player.onGround = false;

    // تصادم مع المنصات
    for (const p of platforms) {
        if (checkCollision(player, p)) {
            if (player.vy > 0 && player.y + player.h - player.vy <= p.y + 5) {
                player.y = p.y - player.h;
                player.vy = 0;
                player.onGround = true;
            } else if (player.vy < 0 && player.y - player.vy >= p.y + p.h - 5) {
                player.y = p.y + p.h;
                player.vy = 0;
            } else if (player.vx > 0) {
                player.x = p.x - player.w;
            } else if (player.vx < 0) {
                player.x = p.x + p.w;
            }
        }
    }

    // حدود الشاشة
    if (player.x < 0) player.x = 0;
    if (player.x + player.w > canvas.width) player.x = canvas.width - player.w;

    // سقوط من الشاشة
    if (player.y > canvas.height + 100) {
        player.lives--;
        player.x = 100; player.y = 300;
        player.vx = 0; player.vy = 0;
        if (player.lives <= 0) gameOver = true;
    }

    // العملات
    for (const c of coins) {
        if (!c.collected && checkCollision(player, { x: c.x-12, y: c.y-12, w: 24, h: 24 })) {
            c.collected = true;
            player.score += 10;
        }
    }

    // فوز
    if (coins.every(c => c.collected)) win = true;

    // الأعداء
    for (const e of enemies) {
        e.x += e.vx;
        if (e.x <= e.startX || e.x + e.w >= e.endX) e.vx *= -1;

        if (checkCollision(player, e)) {
            if (player.vy > 0 && player.y + player.h - player.vy <= e.y + 10) {
                // قفز فوق العدو
                player.vy = -10;
                e.x = -100; // إزالة العدو
                player.score += 20;
            } else {
                player.lives--;
                player.x = 100; player.y = 300;
                player.vx = 0; player.vy = 0;
                if (player.lives <= 0) gameOver = true;
            }
        }
    }
}

function drawBackground() {
    // سماء
    const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
    grad.addColorStop(0, '#0f0c29');
    grad.addColorStop(1, '#302b63');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // نجوم
    ctx.fillStyle = 'white';
    for (let i = 0; i < 50; i++) {
        const x = (i * 173) % canvas.width;
        const y = (i * 97) % 300;
        const size = (i % 3 === 0) ? 2 : 1;
        ctx.beginPath();
        ctx.arc(x, y, size, 0, Math.PI*2);
        ctx.fill();
    }
}

function drawPlatforms() {
    platforms.forEach((p, i) => {
        // منصة
        const grad = ctx.createLinearGradient(p.x, p.y, p.x, p.y + p.h);
        grad.addColorStop(0, i === 0 ? '#27ae60' : '#8e44ad');
        grad.addColorStop(1, i === 0 ? '#1e8449' : '#6c3483');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.roundRect(p.x, p.y, p.w, p.h, 5);
        ctx.fill();

        // حافة لامعة
        ctx.fillStyle = 'rgba(255,255,255,0.2)';
        ctx.fillRect(p.x, p.y, p.w, 3);
    });
}

function drawCoins() {
    coins.forEach(c => {
        if (c.collected) return;
        const pulse = Math.sin(animFrame * 0.1) * 2;
        ctx.beginPath();
        ctx.arc(c.x, c.y, 10 + pulse, 0, Math.PI*2);
        ctx.fillStyle = '#f1c40f';
        ctx.shadowBlur = 15;
        ctx.shadowColor = '#f39c12';
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.fillStyle = '#f39c12';
        ctx.font = 'bold 10px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('$', c.x, c.y + 4);
    });
}

function drawEnemies() {
    enemies.forEach(e => {
        if (e.x < 0) return;
        // جسم العدو
        ctx.fillStyle = '#e74c3c';
        ctx.beginPath();
        ctx.roundRect(e.x, e.y, e.w, e.h, 5);
        ctx.fill();
        // عيون
        ctx.fillStyle = 'white';
        ctx.beginPath();
        ctx.arc(e.x + 8, e.y + 12, 6, 0, Math.PI*2);
        ctx.arc(e.x + 27, e.y + 12, 6, 0, Math.PI*2);
        ctx.fill();
        ctx.fillStyle = '#000';
        ctx.beginPath();
        ctx.arc(e.x + (e.vx > 0 ? 10 : 8), e.y + 12, 3, 0, Math.PI*2);
        ctx.arc(e.x + (e.vx > 0 ? 29 : 27), e.y + 12, 3, 0, Math.PI*2);
        ctx.fill();
        // أسنان
        ctx.fillStyle = 'white';
        ctx.fillRect(e.x + 8, e.y + 25, 5, 6);
        ctx.fillRect(e.x + 16, e.y + 25, 5, 6);
        ctx.fillRect(e.x + 24, e.y + 25, 5, 6);
    });
}

function drawPlayer() {
    const bounce = player.onGround ? Math.sin(animFrame * 0.2) * 1 : 0;

    // جسم
    ctx.fillStyle = player.color;
    ctx.beginPath();
    ctx.roundRect(player.x, player.y + bounce, player.w, player.h, 8);
    ctx.fill();

    // عيون
    ctx.fillStyle = 'white';
    ctx.beginPath();
    ctx.arc(player.x + 12, player.y + 15 + bounce, 6, 0, Math.PI*2);
    ctx.arc(player.x + 28, player.y + 15 + bounce, 6, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.arc(player.x + (player.vx >= 0 ? 14 : 10), player.y + 15 + bounce, 3, 0, Math.PI*2);
    ctx.arc(player.x + (player.vx >= 0 ? 30 : 26), player.y + 15 + bounce, 3, 0, Math.PI*2);
    ctx.fill();

    // ابتسامة
    ctx.beginPath();
    ctx.arc(player.x + 20, player.y + 30 + bounce, 8, 0, Math.PI);
    ctx.strokeStyle = 'white';
    ctx.lineWidth = 2;
    ctx.stroke();
}

function drawHUD() {
    // نقاط
    ctx.fillStyle = 'white';
    ctx.font = 'bold 20px Arial';
    ctx.textAlign = 'left';
    ctx.fillText(`⭐ ${player.score}`, 20, 35);

    // حياة
    ctx.textAlign = 'right';
    ctx.fillText(`❤️ ${player.lives}`, canvas.width - 20, 35);

    // عملات
    const collected = coins.filter(c => c.collected).length;
    ctx.textAlign = 'center';
    ctx.fillText(`🪙 ${collected}/${coins.length}`, canvas.width/2, 35);
}

function drawGameOver() {
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#e74c3c';
    ctx.font = 'bold 60px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('Game Over!', canvas.width/2, canvas.height/2 - 30);
    ctx.fillStyle = 'white';
    ctx.font = '25px Arial';
    ctx.fillText(`نقاطك: ${player.score}`, canvas.width/2, canvas.height/2 + 20);
    ctx.fillText('اضغط R للعب مجدداً', canvas.width/2, canvas.height/2 + 60);
}

function drawWin() {
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#f1c40f';
    ctx.font = 'bold 60px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('🏆 فزت! 🏆', canvas.width/2, canvas.height/2 - 30);
    ctx.fillStyle = 'white';
    ctx.font = '25px Arial';
    ctx.fillText(`نقاطك: ${player.score}`, canvas.width/2, canvas.height/2 + 20);
    ctx.fillText('اضغط R للعب مجدداً', canvas.width/2, canvas.height/2 + 60);
}

// إعادة اللعبة
window.addEventListener('keydown', e => {
    if (e.key === 'r' || e.key === 'R') location.reload();
});

function animate() {
    update();
    drawBackground();
    drawPlatforms();
    drawCoins();
    drawEnemies();
    drawPlayer();
    drawHUD();
    if (gameOver) drawGameOver();
    if (win) drawWin();
    requestAnimationFrame(animate);
}

animate();
</script>
</body>
</html>
